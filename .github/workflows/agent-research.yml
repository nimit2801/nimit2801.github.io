name: Refresh Agent Research

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: agent-research
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Regenerate research data
        run: yarn research:update

      - name: Commit and push if changed
        run: |
          if git diff --quiet -- public/data/agent-research.json; then
            echo 'No research changes detected.'
            exit 0
          fi

          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add public/data/agent-research.json
          git commit -m 'docs: refresh agent research'
          git push origin HEAD:main
